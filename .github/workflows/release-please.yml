name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_as:
        description: "Optional version override (e.g., 1.0.0 for first stable release)"
        required: false
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created || steps.release_override.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.release_override.outputs.tag_name }}
    steps:
      - name: Release please
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.release_as == '' }}
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please.json
          manifest-file: .release-please-manifest.json

      - name: Release please with version override
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_as != '' }}
        uses: googleapis/release-please-action@v4
        id: release_override
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .release-please.json
          manifest-file: .release-please-manifest.json
          release-as: ${{ github.event.inputs.release_as }}

  trigger-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger release workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: {
                version: '${{ needs.release-please.outputs.tag_name }}'
              }
            })
