name: "Release Tauri App"

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    environment: ${{ (github.ref_name == 'main' || startsWith(github.ref_name, 'v')) && 'production' || '' }}
    permissions:
      contents: write
    env:
      IS_PRODUCTION: ${{ github.ref_name == 'main' || startsWith(github.ref_name, 'v') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (Apple Silicon)
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          # macOS x64 (Intel)
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          # Windows
          - platform: "windows-latest"
            args: ""
            target: ""
          # Linux
          - platform: "ubuntu-22.04"
            args: ""
            target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install WiX toolset
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $wixCandle = Get-Command candle.exe -ErrorAction SilentlyContinue
          if (-not $wixCandle) {
            choco install wixtoolset -y --no-progress
            $wixCandle = Get-Command candle.exe -ErrorAction Stop
          }
          $wixPath = Split-Path -Path $wixCandle.Source -Parent
          "$wixPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # Windows Code Signing
      - name: Import Windows Certificate
        if: matrix.platform == 'windows-latest'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not [string]::IsNullOrEmpty($env:WINDOWS_CERTIFICATE)) {
            New-Item -ItemType directory -Path certificate -Force
            Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
            certutil -decode certificate/tempCert.txt certificate/certificate.pfx
            Remove-Item -path certificate -include tempCert.txt -Force
            $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
            Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          } else {
            Write-Host "WINDOWS_CERTIFICATE not configured, skipping code signing"
          }
        shell: pwsh

      # macOS Code Signing
      - name: Import Apple Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

            # Preflight: fail early with clear diagnostics if cert/password are mismatched.
            if ! openssl pkcs12 -in certificate.p12 -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys -info >/dev/null 2>&1; then
              if ! openssl pkcs12 -legacy -in certificate.p12 -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys -info >/dev/null 2>&1; then
                echo "::error::APPLE_CERTIFICATE preflight failed. Verify production environment secrets APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD are from the same .p12 export."
                exit 1
              fi
            fi

            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          else
            echo "APPLE_CERTIFICATE not configured, skipping code signing"
          fi

      - name: Install frontend dependencies
        run: bun install

      - name: Disable updater for non-production builds
        if: env.IS_PRODUCTION != 'true'
        shell: bash
        run: echo "EXTRA_ARGS=--config src-tauri/tauri.ci.json" >> $GITHUB_ENV

      - name: Configure signing environment
        if: env.IS_PRODUCTION == 'true'
        shell: bash
        run: |
          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<ENDOFKEY"
            echo "$SIGNING_KEY"
            echo "ENDOFKEY"
          } >> $GITHUB_ENV
          {
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD<<ENDOFPASS"
            echo "$SIGNING_PASSWORD"
            echo "ENDOFPASS"
          } >> $GITHUB_ENV
          echo "APPLE_ID=$APPLE_ID_SECRET" >> $GITHUB_ENV
          echo "APPLE_PASSWORD=$APPLE_PASSWORD_SECRET" >> $GITHUB_ENV
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_SECRET" >> $GITHUB_ENV
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"signingIdentity\": null/\"signingIdentity\": \"$APPLE_SIGNING_IDENTITY_SECRET\"/" src-tauri/tauri.conf.json
            sed -i '' "s/\"pubkey\": \"\"/\"pubkey\": \"$TAURI_UPDATER_PUBKEY_SECRET\"/" src-tauri/tauri.conf.json
          else
            sed -i "s/\"signingIdentity\": null/\"signingIdentity\": \"$APPLE_SIGNING_IDENTITY_SECRET\"/" src-tauri/tauri.conf.json
            sed -i "s/\"pubkey\": \"\"/\"pubkey\": \"$TAURI_UPDATER_PUBKEY_SECRET\"/" src-tauri/tauri.conf.json
          fi
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_SECRET: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY_SECRET: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_UPDATER_PUBKEY_SECRET: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          RUNNER_OS: ${{ runner.os }}

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: "Minikyu ${{ github.ref_name || inputs.version }}"
          releaseBody: |
            ## Minikyu ${{ github.ref_name || inputs.version }}

            ### Installation Instructions
            - **macOS**: Download the `.dmg` file and drag to Applications folder
            - **Windows**: Download the `.msi` file and run the installer
            - **Linux**: Download the `.AppImage` file, make it executable (`chmod +x`), and run

            ### Auto-Updates
            Existing users will receive automatic update notifications.

            **Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name || inputs.version }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: ${{ env.IS_PRODUCTION == 'true' }}
          args: ${{ matrix.args }} ${{ env.EXTRA_ARGS }}

      - name: Upload macOS app bundle for universal build
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/Minikyu.app
          retention-days: 1

  publish-macos-universal:
    needs: [publish-tauri]
    if: startsWith(github.ref_name, 'v')
    runs-on: macos-latest
    environment: production
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-app-aarch64-apple-darwin
          path: arm64-app/Minikyu.app

      - name: Download x64 app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-app-x86_64-apple-darwin
          path: x64-app/Minikyu.app

      - name: Verify downloaded app bundles
        run: |
          echo "=== arm64 app ==="
          file arm64-app/Minikyu.app/Contents/MacOS/Minikyu
          echo "=== x64 app ==="
          file x64-app/Minikyu.app/Contents/MacOS/Minikyu
          echo "=== Check for nested binaries/frameworks ==="
          find arm64-app/Minikyu.app -name "*.dylib" -o -name "*.framework" | head -20 || echo "No nested binaries found"

      - name: Import Apple Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

      - name: Create universal binary with lipo
        run: |
          # Copy the arm64 app as the base (preserves all resources, frameworks, Info.plist)
          mkdir -p universal-app
          cp -R arm64-app/Minikyu.app universal-app/Minikyu.app

          # Merge the main executable
          lipo -create \
            arm64-app/Minikyu.app/Contents/MacOS/Minikyu \
            x64-app/Minikyu.app/Contents/MacOS/Minikyu \
            -output universal-app/Minikyu.app/Contents/MacOS/Minikyu

          # Verify the universal binary
          file universal-app/Minikyu.app/Contents/MacOS/Minikyu
          lipo -info universal-app/Minikyu.app/Contents/MacOS/Minikyu

      - name: Extract entitlements from arm64 app
        run: |
          codesign -d --entitlements :- arm64-app/Minikyu.app > entitlements.plist || true
          if [ -s entitlements.plist ]; then
            echo "Extracted entitlements:"
            cat entitlements.plist
          else
            echo "No entitlements found in arm64 app"
            rm -f entitlements.plist
          fi

      # APPLE_SIGNING_IDENTITY must be the full identity string,
      # e.g. "Developer ID Application: Name (TEAMID)"
      - name: Re-sign the universal app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Remove existing signatures
          codesign --remove-signature universal-app/Minikyu.app || true

          # Re-sign with hardened runtime (required for notarization)
          if [ -f entitlements.plist ]; then
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --options runtime \
              --entitlements entitlements.plist \
              universal-app/Minikyu.app
          else
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --options runtime \
              universal-app/Minikyu.app
          fi

          # Verify
          codesign --verify --strict universal-app/Minikyu.app

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          # Fall back to inputs.version for workflow_dispatch
          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="${{ inputs.version }}"
          fi
          # Strip 'v' prefix
          CLEAN_VERSION="${VERSION#v}"
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

      - name: Create DMG
        run: |
          DMG_NAME="Minikyu_${{ steps.version.outputs.version }}_universal.dmg"
          hdiutil create -volname "Minikyu" \
            -srcfolder universal-app/Minikyu.app \
            -ov -format UDZO \
            "$DMG_NAME"
          echo "DMG_PATH=$DMG_NAME" >> $GITHUB_ENV

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple "$DMG_PATH"

      - name: Upload universal DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" "$DMG_PATH" \
            --clobber

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
