pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: '**/*.{js,jsx,ts,tsx,json,css}'
      run: bun run biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    type-check:
      glob: '**/*.{ts,tsx}'
      run: bunx tsc --noEmit

    i18n-compile:
      glob: '**/*.{ts,tsx}'
      run: bunx lingui extract && bunx lingui compile --typescript
      stage_fixed: true

    actionlint:
      glob: '.github/workflows/*.{yml,yaml}'
      run: actionlint -shellcheck=""

pre-push:
  parallel: true
  commands:
    biome-full:
      run: bun run lint

    test:
      run: bun run test:run

    tauri-check:
      run: bun run tauri:check

commit-msg:
  commands:
    lint:
      run: bunx commitlint --edit {1}
